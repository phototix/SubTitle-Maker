<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Subtitle Character Attribution</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a2e;
            color: #e6e6e6;
        }
        h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .container {
            background-color: #16213e;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input, textarea {
            background-color: #0f3460;
            color: #e6e6e6;
            border: 1px solid #2d4059;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        button {
            background-color: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            background-color: #ffed4e;
            transform: translateY(-2px);
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }
        .success {
            background-color: rgba(0, 200, 0, 0.2);
            color: #4caf50;
        }
        .error {
            background-color: rgba(200, 0, 0, 0.2);
            color: #f44336;
        }
        .info {
            background-color: rgba(0, 100, 200, 0.2);
            color: #2196f3;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #0f3460;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background-color: #ffd700;
            width: 0%;
            transition: width 0.3s ease;
        }
        .result {
            white-space: pre-wrap;
            background-color: #0f3460;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            font-family: monospace;
        }
        .instructions {
            background-color: rgba(255, 215, 0, 0.1);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #ffd700;
        }
        .instructions h3 {
            margin-top: 0;
            color: #ffd700;
        }
        .instructions ol {
            padding-left: 20px;
        }
        .instructions li {
            margin-bottom: 10px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Movie Subtitle Character Attribution</h1>
    
    <div class="container">
        <div class="instructions">
            <h3>How to use:</h3>
            <ol>
                <li>Enter your OpenAI API key (will not be stored)</li>
                <li>Upload your Movie SRT subtitle file</li>
                <li>Click "Process Subtitles" to identify speakers</li>
                <li>Download the result as a text file</li>
            </ol>
        </div>
        
        <div class="input-group">
            <label for="api-key">OpenAI API Key:</label>
            <input type="password" id="api-key" placeholder="Enter your OpenAI API key">
        </div>
        
        <div class="input-group">
            <label for="movieTitle">Movie Title:</label>
            <input type="text" id="movieTitle" placeholder="Enter the movie title (default: Star Wars: A New Hope)">
        </div>
        
        <div class="input-group">
            <label for="srt-file">Upload SRT File:</label>
            <input type="file" id="srt-file" accept=".srt">
        </div>
        
        <button id="process-btn">Process Subtitles</button>
        
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="result" id="result" style="display: none;"></div>
        
        <button id="download-btn" style="display: none;">Download Result</button>
    </div>
    
    <div class="footer">
        Created for Movie subtitle processing
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const apiKeyInput = document.getElementById('api-key');
            const srtFileInput = document.getElementById('srt-file');
            const processBtn = document.getElementById('process-btn');
            const downloadBtn = document.getElementById('download-btn');
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const progressBar = document.getElementById('progress');
            const movieTitle = document.getElementById('movieTitle');
            
            let processedSubtitles = '';
            
            // Parse SRT file content
            function parseSRT(content) {
                const lines = content.split('\n');
                const subtitles = [];
                let currentSubtitle = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    // Skip empty lines
                    if (!line) continue;
                    
                    // Check if line is a number (subtitle index)
                    if (!isNaN(line) && !currentSubtitle) {
                        currentSubtitle = { index: parseInt(line), text: '' };
                    } 
                    // Check if line is a timestamp
                    else if (line.includes('-->') && currentSubtitle) {
                        currentSubtitle.timestamp = line;
                    } 
                    // Otherwise, it's subtitle text
                    else if (currentSubtitle) {
                        if (currentSubtitle.text) {
                            currentSubtitle.text += ' ' + line;
                        } else {
                            currentSubtitle.text = line;
                        }
                    }
                    
                    // If we have a complete subtitle, add it to the list
                    if (currentSubtitle && lines[i+1] && !lines[i+1].trim() && currentSubtitle.text) {
                        subtitles.push(currentSubtitle);
                        currentSubtitle = null;
                    }
                }
                
                // Add the last subtitle if exists
                if (currentSubtitle && currentSubtitle.text) {
                    subtitles.push(currentSubtitle);
                }
                
                return subtitles;
            }
            
            // Process subtitle with OpenAI API
            async function processSubtitleWithOpenAI(apiKey, subtitleText, movieTitle) {
                try {
                    const response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-3.5-turbo',
                            messages: [
                                {
                                    role: 'system',
                                    content: `You are an expert on "${movieTitle}" Identify who is speaking each line of dialogue. Respond only with the character name followed by a colon and the dialogue. If uncertain, make your best guess based on context.`
                                },
                                {
                                    role: 'user',
                                    content: `Identify the speaker for this line from Star Wars: A New Hope: "${subtitleText}"`
                                }
                            ],
                            max_tokens: 50,
                            temperature: 0.3
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API request failed: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    return data.choices[0].message.content.trim();
                } catch (error) {
                    console.error('Error calling OpenAI API:', error);
                    return `Unknown: ${subtitleText}`;
                }
            }
            
            // Process all subtitles
            async function processSubtitles(apiKey, subtitles) {
                processedSubtitles = '';
                const totalSubtitles = subtitles.length;
                
                for (let i = 0; i < totalSubtitles; i++) {
                    const subtitle = subtitles[i];
                    
                    // Update progress
                    const progress = ((i + 1) / totalSubtitles) * 100;
                    progressBar.style.width = `${progress}%`;
                    statusDiv.textContent = `Processing subtitle ${i + 1} of ${totalSubtitles}...`;
                    statusDiv.className = 'status info';
                    
                    // Process the subtitle
                    const result = await processSubtitleWithOpenAI(apiKey, subtitle.text, movieTitle ? movieTitle.value.trim() : 'Star Wars: A New Hope');
                    
                    // Add to result
                    processedSubtitles += `${result}\n`;
                    
                    // Update result display
                    resultDiv.textContent = processedSubtitles;
                    
                    // Small delay to avoid rate limiting
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                
                statusDiv.textContent = 'Processing complete!';
                statusDiv.className = 'status success';
                downloadBtn.style.display = 'block';
                resultDiv.style.display = 'block';
            }
            
            // Handle file upload
            srtFileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Reset UI
                    statusDiv.textContent = 'File loaded successfully. Click "Process Subtitles" to continue.';
                    statusDiv.className = 'status success';
                    resultDiv.style.display = 'none';
                    downloadBtn.style.display = 'none';
                    progressBar.style.width = '0%';
                };
                reader.readAsText(file);
            });
            
            // Process button click
            processBtn.addEventListener('click', async function() {
                const apiKey = apiKeyInput.value.trim();
                const file = srtFileInput.files[0];
                
                if (!apiKey) {
                    statusDiv.textContent = 'Please enter your OpenAI API key.';
                    statusDiv.className = 'status error';
                    return;
                }
                
                if (!file) {
                    statusDiv.textContent = 'Please upload an SRT file.';
                    statusDiv.className = 'status error';
                    return;
                }
                
                // Disable button during processing
                processBtn.disabled = true;
                processBtn.textContent = 'Processing...';
                
                try {
                    const fileContent = await readFileAsText(file);
                    const subtitles = parseSRT(fileContent);
                    
                    if (subtitles.length === 0) {
                        throw new Error('No subtitles found in the file. Please check the format.');
                    }
                    
                    statusDiv.textContent = `Found ${subtitles.length} subtitles. Starting processing...`;
                    statusDiv.className = 'status info';
                    
                    await processSubtitles(apiKey, subtitles);
                } catch (error) {
                    statusDiv.textContent = `Error: ${error.message}`;
                    statusDiv.className = 'status error';
                    console.error(error);
                } finally {
                    // Re-enable button
                    processBtn.disabled = false;
                    processBtn.textContent = 'Process Subtitles';
                }
            });
            
            // Download button click
            downloadBtn.addEventListener('click', function() {
                const blob = new Blob([processedSubtitles], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'star_wars_subtitles_with_speakers.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
            
            // Helper function to read file as text
            function readFileAsText(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = e => reject(new Error('Failed to read file'));
                    reader.readAsText(file);
                });
            }
        });
    </script>
</body>
</html>
